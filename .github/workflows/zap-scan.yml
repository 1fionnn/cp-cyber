name: ZAP Scan

on: push

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir aplicação
        run: |
          docker run -d --name app -p 8080:80 nginx
          sleep 20

      - name: Testar aplicação
        run: curl http://localhost:8080

      - name: Rodar ZAP
        run: |
         docker run --rm \
         -v $(pwd):/zap/wrk \
         ghcr.io/zaproxy/zaproxy:stable \
         zap-baseline.py \
         -t http://127.0.0.1:8080 \
         -r zap-report.html \
         -J zap-report.json \
         -x zap-report.xml

      - name: Garantir que arquivo existe
        run: ls -la

      - name: Verificar arquivos
        run: ls -la

      - name: Upload relatório ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
         name: zap-report
         path: zap-report.html