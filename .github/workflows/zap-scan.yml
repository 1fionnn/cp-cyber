name: ZAP Scan

on:
  push:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir app
        run: docker run -d -p 8080:80 nginx

      - name: Esperar app
        run: sleep 10

      - name: Rodar ZAP
        run: |
             docker run --rm 
             -v $(pwd):/zap/wrk/:rw 
             -t owasp/zap2docker-stable zap-baseline.py 
             -t http://127.0.0.1:8080 
             -r zap-report.html


      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.html