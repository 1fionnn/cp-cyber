name: ZAP Scan

on: push

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir app
        run: |
          docker run -d --name app -p 8080:80 nginx
          sleep 20

      - name: Testar app
        run: curl http://localhost:8080

      - name: Rodar ZAP
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -r zap-report.html

      - name: Verificar arquivos
        run: ls -la

      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html